services:
  database:
    container_name: landline-database
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: landline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Lets `docker compose up --wait` block until Postgres accepts connections.
      test: ["CMD-SHELL", "pg_isready -U postgres -d landline"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
    driver: local
